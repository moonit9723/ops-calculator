<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OPS 등급 계산기</title>
    <style>
        body { background: #121212; color: #e8fefe; font-family: 'Segoe UI', Arial; text-align: center; overflow-x: hidden; }
        
        .container { 
            position: relative; 
            width: 520px; 
            margin: 80px auto; 
            padding: 40px; 
            border-radius: 25px; 
            background: #1a1a1a; 
            border: 1px solid #2ee6c9; 
            box-shadow: 0 0 40px rgba(0,255,200,0.15); 
            z-index: 10;
        }

        /* 🔥 날아가는 야구공 애니메이션 */
        #flyingBall {
            position: absolute;
            width: 45px;
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        @keyframes hitBall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(900px, -300px) rotate(1080deg); opacity: 0; }
        }

        /* 📸 이미지 배치 (자연스러운 레이아웃) */
        .deco-img { position: absolute; pointer-events: none; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .img-mask { width: 100px; left: -110px; top: 10px; transform: rotate(-10deg); }
        .img-glove { width: 120px; left: -130px; bottom: -20px; transform: rotate(15deg); }
        .img-bat { width: 140px; right: -120px; top: -30px; transform: rotate(20deg); }
        .img-ball-static { width: 50px; right: -100px; bottom: 20px; opacity: 0.8; }

        /* 🔥 단계 선택 버튼 (내부 데이터 로드) */
        .stage-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .stage-btn {
            background: #222;
            border: 1px solid #3eeed2;
            color: #3eeed2;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }
        .stage-btn:hover { background: #3eeed2; color: #111; }

        /* 타이틀 & 툴팁 */
        .title-wrapper { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 20px; }
        h1 { color: #b9fff7; text-shadow: 0 0 15px #00ffe1; margin: 0; font-size: 28px; }
        .info-icon { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #3eeed2; color: #3eeed2; cursor: pointer; font-weight: bold; line-height: 26px; }
        .info-tooltip {
            visibility: hidden; opacity: 0; width: 280px; background: #222; color: #fff;
            text-align: left; border-radius: 10px; padding: 15px; position: absolute;
            top: 60px; left: 50%; transform: translateX(-50%); border: 1px solid #00ffe1;
            box-shadow: 0 0 20px rgba(0,255,225,0.3); font-size: 14px; line-height: 1.6; transition: 0.3s; z-index: 100;
        }
        .info-tooltip.show { visibility: visible; opacity: 1; }

        /* 입력 및 라벨 */
        .labels { display: flex; justify-content: space-around; margin-bottom: 8px; color: #9efcff; font-weight: bold; }
        .inputs { display: flex; justify-content: space-around; }
        input { width: 110px; padding: 12px; background: #080808; border: 1px solid #3eeed2; border-radius: 10px; color: #b9fff7; text-align: center; font-size: 18px; }
        input:focus { border: 1px solid #00ffe1; box-shadow: 0 0 15px #00ffe1; outline: none; }
        
        button#calcBtn {
            display: block; margin: 30px auto 0; width: 320px; padding: 16px;
            font-size: 20px; font-weight: bold; background: transparent;
            border: 2px solid #00ffe1; color: #b9fff7; border-radius: 12px;
            cursor: pointer; transition: 0.3s;
        }
        button#calcBtn:hover { background: #00ffe1; color: black; box-shadow: 0 0 25px #00ffe1; }

        /* 결과창 스타일 */
        .result-box { margin-top: 30px; padding: 20px; border-radius: 15px; display: none; border: 2px solid; }
        .ss { border-color: #ffb84d; color: #ffd699; box-shadow: 0 0 20px rgba(255, 184, 77, 0.3); }
        .s  { border-color: #fff176; color: #fff9c4; }
        .a  { border-color: #ff8a80; color: #ffcdd2; }
        .b  { border-color: #81c784; color: #c8e6c9; }
        .c  { border-color: #64b5f6; color: #bbdefb; }
        .d  { border-color: #bcaaa4; color: #d7ccc8; }
        .grade { font-size: 26px; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

<img id="flyingBall" src="image-removebg-preview (4).png" alt="flying ball">

<div class="container">
    <img src="image-removebg-preview (2).png" class="deco-img img-mask" alt="mask">
    <img src="image-removebg-preview.png" class="deco-img img-glove" alt="glove">
    <img src="image-removebg-preview (1).png" class="deco-img img-bat" alt="bat">
    <img src="image-removebg-preview (4).png" class="deco-img img-ball-static" alt="ball">

    <div class="title-wrapper">
        <h1>OPS 등급 계산기</h1>
        <div class="info-icon" onclick="toggleTooltip(event)">?</div>
        <div class="info-tooltip" id="tooltip">
            <b>SS (1.050)</b> : 역사에 남을 만한 시즌<br>
            <b>S+ (1.000)</b> : MVP급 시즌<br>
            <b>S (0.950)</b> : 리그 최상위권<br>
            <b>A+ (0.900)</b> : 리그 상위권<br>
            <b>A (0.850)</b> : 훌륭한 시즌<br>
            <b>B+ (0.800)</b> : 좋은 시즌<br>
            <b>B (0.750)</b> : 평균적인 지표<br>
            <b>C+ (0.700)</b> : 수비형 선수의 하한선<br>
            <b>C (0.650)</b> : 아쉬운 시즌<br>
            <b>D (0.600↓)</b> : 최악의 시즌
        </div>
    </div>

    <div class="stage-selector">
        <button class="stage-btn" onclick="loadStage(1)">1단계</button>
        <button class="stage-btn" onclick="loadStage(2)">2단계</button>
        <button class="stage-btn" onclick="loadStage(3)">3단계</button>
        <button class="stage-btn" onclick="loadStage(4)">4단계</button>
        <button class="stage-btn" onclick="loadStage(5)">5단계</button>
    </div>

    <div class="labels">
        <div>타율</div><div>출루율</div><div>장타율</div>
    </div>
    <div class="inputs">
        <input id="avg" type="text" placeholder=".000">
        <input id="obp" type="text" placeholder=".000">
        <input id="slg" type="text" placeholder=".000">
    </div>
    
    <button id="calcBtn" onclick="calculate()">기록 계산하기</button>

    <p id="error" style="font-size: 14px; margin-top: 15px; color: #ff9b9b; height: 20px;"></p>
    
    <div id="resultBox" class="result-box">
        <p style="margin:0; opacity:0.8; font-size: 14px;">최종 OPS</p>
        <span id="opsValue" style="font-size: 24px; font-weight: bold;"></span>
        <div class="grade" id="gradeText"></div>
    </div>
</div>

<script>
    // 🔥 요청하신 내부 데이터 저장
    const stageData = {
        1: { avg: 0.240, obp: 0.300, slg: 0.320 },
        2: { avg: 0.260, obp: 0.330, slg: 0.370 },
        3: { avg: 0.280, obp: 0.350, slg: 0.400 },
        4: { avg: 0.300, obp: 0.400, slg: 0.500 },
        5: { avg: 0.355, obp: 0.444, slg: 0.633 }
    };

    // 데이터 불러오기 함수
    function loadStage(num) {
        const data = stageData[num];
        document.getElementById('avg').value = data.avg.toFixed(3);
        document.getElementById('obp').value = data.obp.toFixed(3);
        document.getElementById('slg').value = data.slg.toFixed(3);
        calculate(); // 불러오자마자 바로 계산 실행
    }

    function toggleTooltip(event) {
        event.stopPropagation();
        document.getElementById('tooltip').classList.toggle('show');
    }

    document.addEventListener('click', () => document.getElementById('tooltip').classList.remove('show'));

    function getGrade(ops) {
        if (ops >= 1.050) return ["SS - 역사에 남을 시즌", "ss"];
        if (ops >= 1.000) return ["S+ - MVP급 시즌", "s"];
        if (ops >= 0.950) return ["S - 리그 최상위권", "s"];
        if (ops >= 0.900) return ["A+ - 리그 상위권", "a"];
        if (ops >= 0.850) return ["A - 훌륭한 시즌", "a"];
        if (ops >= 0.800) return ["B+ - 좋은 시즌", "b"];
        if (ops >= 0.750) return ["B - 평균적인 지표", "b"];
        if (ops >= 0.700) return ["C+ - 수비형 하한선", "c"];
        if (ops >= 0.650) return ["C - 아쉬운 시즌", "c"];
        return ["D - 최악의 시즌", "d"];
    }

    function calculate() {
        let avg = parseFloat(document.getElementById("avg").value) || 0;
        let obp = parseFloat(document.getElementById("obp").value) || 0;
        let slg = parseFloat(document.getElementById("slg").value) || 0;

        // 에러 체크
        let error = "";
        if (avg > 1 || obp > 1) error = "타율/출루율은 1을 넘을 수 없습니다.";
        if (avg > slg && slg > 0) error = "타율이 장타율보다 높을 수 없습니다.";
        
        if (error !== "") {
            document.getElementById("error").innerText = error;
            document.getElementById("resultBox").style.display = "none";
            return;
        }
        document.getElementById("error").innerText = "";

        // 🔥 야구공 날리기 애니메이션
        const ball = document.getElementById('flyingBall');
        ball.style.display = 'block';
        ball.style.left = '380px'; 
        ball.style.top = '320px';
        ball.style.animation = 'none';
        ball.offsetHeight; 
        ball.style.animation = 'hitBall 0.7s ease-out forwards';

        // 계산 결과 반영
        let ops = obp + slg;
        let [text, cls] = getGrade(ops);
        
        setTimeout(() => {
            document.getElementById("opsValue").innerText = ops.toFixed(3);
            document.getElementById("gradeText").innerText = text;
            const box = document.getElementById("resultBox");
            box.className = "result-box " + cls;
            box.style.display = "block";
        }, 200);
    }
</script>

</body>
</html>
