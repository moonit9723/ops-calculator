<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OPS 계산기</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: #f4f6f9;
    text-align: center;
}

.container {
    width: 400px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 { margin-bottom: 20px; }

input {
    width: 100px;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

#error { color: red; }

.result-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    display: none;
    color: white;
    font-weight: bold;
}

/* 색상 */
.ss { background: orange; }
.s { background: gold; color: black; }
.a { background: red; }
.b { background: green; }
.c { background: blue; }
.d { background: brown; }

</style>
</head>

<body>

<div class="container">
    <h1>OPS 등급 계산기</h1>

    <input id="avg" type="number" step="0.001" placeholder="타율">
    <input id="obp" type="number" step="0.001" placeholder="출루율">
    <input id="slg" type="number" step="0.001" placeholder="장타율">

    <br>
    <button onclick="calculate()">계산</button>

    <p id="error"></p>

    <div id="resultBox" class="result-box">
        OPS: <span id="ops"></span><br>
        등급: <span id="grade"></span>
    </div>
</div>

<script>
const inputs = ["avg", "obp", "slg"];

function getGrade(ops) {
    if (ops >= 1.050) return ["SS", "ss"];
    if (ops >= 1.000) return ["S+", "s"];
    if (ops >= 0.950) return ["S", "s"];
    if (ops >= 0.900) return ["A+", "a"];
    if (ops >= 0.850) return ["A", "a"];
    if (ops >= 0.800) return ["B+", "b"];
    if (ops >= 0.750) return ["B", "b"];
    if (ops >= 0.700) return ["C+", "c"];
    if (ops >= 0.650) return ["C", "c"];
    if (ops >= 0.600) return ["D", "d"];
    return ["D 이하", "d"];
}

function calculate() {
    let avg = parseFloat(document.getElementById("avg").value);
    let obp = parseFloat(document.getElementById("obp").value);
    let slg = parseFloat(document.getElementById("slg").value);

    let error = "";

    if (avg > 1) error += "타율이 1을 넘었습니다!<br>";
    if (obp > 1) error += "출루율이 1을 넘었습니다!<br>";
    if (slg > 4) error += "장타율이 4를 넘었습니다!<br>";
    if (avg > slg) error += "타율이 장타율보다 큽니다!<br>";

    if (error !== "") {
        document.getElementById("error").innerHTML = error;
        document.getElementById("resultBox").style.display = "none";
        return;
    }

    document.getElementById("error").innerHTML = "";

    let ops = obp + slg;
    let [gradeText, gradeClass] = getGrade(ops);

    let box = document.getElementById("resultBox");

    document.getElementById("ops").innerText = ops.toFixed(3);
    document.getElementById("grade").innerText = gradeText;

    box.className = "result-box";
    box.classList.add(gradeClass);
    box.style.display = "block";
}

// 🔥 화살표 이동만 (계산 없음)
document.addEventListener("keydown", function(event) {
    let active = document.activeElement;
    let index = inputs.indexOf(active.id);

    if (event.key === "ArrowRight") {
        if (index < inputs.length - 1) {
            document.getElementById(inputs[index + 1]).focus();
        }
    }

    if (event.key === "ArrowLeft") {
        if (index > 0) {
            document.getElementById(inputs[index - 1]).focus();
        }
    }

    if (event.key === "Enter") {
        calculate();
    }
});
</script>

</body>
</html>
