<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OPS 등급 계산기</title>
    <style>
        body { background: #121212; color: #e8fefe; font-family: 'Segoe UI', Arial; text-align: center; overflow-x: hidden; }
        
        /* 메인 컨테이너 */
        .container { 
            position: relative; /* 아이콘 배치의 기준 */
            width: 520px; 
            margin: 100px auto; 
            padding: 40px; 
            border-radius: 18px; 
            background: #1a1a1a; 
            border: 1px solid #2ee6c9; 
            box-shadow: 0 0 30px rgba(0,255,200,0.25); 
        }

        /* 🔥 날아가는 야구공 애니메이션 */
        .flying-ball {
            position: absolute;
            font-size: 30px;
            top: -50px;
            left: -100px;
            animation: homeRun 4s linear infinite;
            z-index: 5;
        }

        @keyframes homeRun {
            0% { left: -100px; top: 20px; transform: rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { top: -60px; } /* 곡선을 그리며 위로 올라감 */
            90% { opacity: 1; }
            100% { left: 600px; top: 20px; transform: rotate(720deg); opacity: 0; }
        }

        /* 🔥 왼쪽 포수 장비 (글러브, 마스크) */
        .deco-left {
            position: absolute;
            left: -90px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0.8;
        }

        /* 🔥 오른쪽 타자 장비 (배트, 공) */
        .deco-right {
            position: absolute;
            right: -90px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0.8;
        }

        /* 제목 영역 */
        .title-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        h1 { color: #b9fff7; text-shadow: 0 0 12px #00ffe1; margin: 0; font-size: 32px; }

        /* 입력창 및 라벨 */
        .labels { display: flex; justify-content: space-around; margin-bottom: 10px; color: #9efcff; font-weight: bold; }
        .inputs { display: flex; justify-content: space-around; }
        input { width: 120px; padding: 12px; background: #0f0f0f; border: 1px solid #3eeed2; border-radius: 8px; color: #b9fff7; text-align: center; font-size: 18px; }
        input:focus { border: 1px solid #00ffe1; box-shadow: 0 0 12px #00ffe1; outline: none; }
        
        /* 계산 버튼 */
        button {
            display: block;
            margin: 30px auto 0;
            width: 280px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            background: transparent;
            border: 2px solid #00ffe1;
            color: #b9fff7;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #00ffe1; color: black; box-shadow: 0 0 20px #00ffe1; }

        /* 툴팁 (도움말) */
        .info-icon {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid #3eeed2;
            color: #3eeed2;
            cursor: pointer;
            user-select: none;
        }
        .info-tooltip {
            visibility: hidden; opacity: 0;
            width: 300px; background: #222; color: #e8fefe;
            text-align: left; border-radius: 8px; padding: 15px;
            position: absolute; z-index: 10; top: 150%; left: 50%;
            transform: translateX(-50%); border: 1px solid #00ffe1;
            box-shadow: 0 0 15px rgba(0, 255, 225, 0.2);
            font-size: 14px; line-height: 1.7; transition: 0.2s;
        }
        .info-tooltip.show { visibility: visible; opacity: 1; }
        .info-tooltip b { color: #00ffe1; }

        /* 결과창 */
        .result-box { margin-top: 30px; padding: 20px; border-radius: 12px; display: none; border: 2px solid; }
        .ss { border-color: #ffb84d; color: #ffd699; text-shadow: 0 0 10px #ffb84d; }
        .s  { border-color: #fff176; color: #fff9c4; }
        .a  { border-color: #ff8a80; color: #ffcdd2; }
        .b  { border-color: #81c784; color: #c8e6c9; }
        .c  { border-color: #64b5f6; color: #bbdefb; }
        .d  { border-color: #bcaaa4; color: #d7ccc8; }
        .grade { font-size: 32px; font-weight: bold; margin-top: 10px; }
        #error { color: #ff9b9b; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="flying-ball">⚾</div>

    <div class="deco-left">
        <span>🛡️</span> <span>🧤</span> </div>

    <div class="deco-right">
        <span>🏏</span> <span>⚾</span> </div>

    <div class="title-wrapper">
        <h1>OPS 등급 계산기</h1>
        <div class="info-icon" onclick="toggleTooltip(event)">
            ?
            <div class="info-tooltip" id="tooltip">
                <b>SS (1.050)</b> : 역사에 남을 만한 시즌<br>
                <b>S+ (1.000)</b> : MVP급 시즌<br>
                <b>S (0.950)</b> : 리그 최상위권<br>
                <b>A+ (0.900)</b> : 리그 상위권<br>
                <b>A (0.850)</b> : 훌륭한 시즌<br>
                <b>B+ (0.800)</b> : 좋은 시즌<br>
                <b>B (0.750)</b> : 평균적인 지표<br>
                <b>C+ (0.700)</b> : 수비형 선수의 하한선<br>
                <b>C (0.650)</b> : 아쉬운 시즌<br>
                <b>D (0.600↓)</b> : 최악의 시즌
            </div>
        </div>
    </div>

    <div class="labels">
        <div>타율</div>
        <div>출루율</div>
        <div>장타율</div>
    </div>
    <div class="inputs">
        <input id="avg" type="text" placeholder=".000">
        <input id="obp" type="text" placeholder=".000">
        <input id="slg" type="text" placeholder=".000">
    </div>
    
    <button onclick="calculate()">기록 계산하기</button>

    <p id="error"></p>
    <div id="resultBox" class="result-box">
        <p style="font-size: 18px; margin:0;">최종 OPS: <span id="ops"></span></p>
        <div class="grade" id="grade"></div>
    </div>
</div>

<script>
    const inputs = ["avg", "obp", "slg"];

    function toggleTooltip(event) {
        event.stopPropagation();
        document.getElementById('tooltip').classList.toggle('show');
    }

    document.addEventListener('click', function(event) {
        const tooltip = document.getElementById('tooltip');
        if (!event.target.closest('.info-icon')) tooltip.classList.remove('show');
    });

    function autoFormat(el) {
        let val = el.value.trim();
        if (val === "" || isNaN(val)) return;
        el.value = parseFloat(val).toFixed(3);
    }

    inputs.forEach(id => {
        let el = document.getElementById(id);
        el.addEventListener("blur", function() { autoFormat(this); });
        el.addEventListener("keydown", e => { if (e.key === "-") e.preventDefault(); });
    });

    function getGrade(ops) {
        if (ops >= 1.050) return ["SS - 역사에 남을 시즌", "ss"];
        if (ops >= 1.000) return ["S+ - MVP급 시즌", "s"];
        if (ops >= 0.950) return ["S - 리그 최상위권", "s"];
        if (ops >= 0.900) return ["A+ - 리그 상위권", "a"];
        if (ops >= 0.850) return ["A - 훌륭한 시즌", "a"];
        if (ops >= 0.800) return ["B+ - 좋은 시즌", "b"];
        if (ops >= 0.750) return ["B - 평균적인 지표", "b"];
        if (ops >= 0.700) return ["C+ - 수비형 하한선", "c"];
        if (ops >= 0.650) return ["C - 아쉬운 시즌", "c"];
        return ["D - 최악의 시즌", "d"];
    }

    function calculate() {
        inputs.forEach(id => autoFormat(document.getElementById(id)));
        let avg = parseFloat(document.getElementById("avg").value) || 0;
        let obp = parseFloat(document.getElementById("obp").value) || 0;
        let slg = parseFloat(document.getElementById("slg").value) || 0;

        let error = "";
        if (avg > 1) error += "타율이 1을 넘을 수 없습니다.<br>";
        if (obp > 1) error += "출루율이 1을 넘을 수 없습니다.<br>";
        if (slg > 4) error += "장타율이 4를 넘을 수 없습니다.<br>";
        if (avg > slg) error += "타율이 장타율보다 높을 수 없습니다.<br>";

        if (error !== "") {
            document.getElementById("error").innerHTML = error;
            document.getElementById("resultBox").style.display = "none";
            return;
        }

        document.getElementById("error").innerHTML = "";
        let ops = obp + slg;
        let [gradeText, gradeClass] = getGrade(ops);

        let box = document.getElementById("resultBox");
        document.getElementById("ops").innerText = ops.toFixed(3);
        document.getElementById("grade").innerText = gradeText;

        box.className = "result-box " + gradeClass;
        box.style.display = "block";
    }

    document.addEventListener("keydown", (e) => {
        let idx = inputs.indexOf(document.activeElement.id);
        if (e.key === "ArrowRight" && idx < 2) document.getElementById(inputs[idx+1]).focus();
        if (e.key === "ArrowLeft" && idx > 0) document.getElementById(inputs[idx-1]).focus();
        if (e.key === "Enter") calculate();
    });
</script>

</body>
</html>
