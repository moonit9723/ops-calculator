<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OPS 등급 계산기</title>
    <style>
        body { background: #121212; color: #e8fefe; font-family: 'Segoe UI', Arial; text-align: center; }
        
        .container { 
            width: 550px; 
            margin: 80px auto; 
            padding: 40px; 
            border-radius: 18px; 
            background: #1a1a1a; 
            border: 1px solid #2ee6c9; 
            box-shadow: 0 0 30px rgba(0,255,200,0.25); 
            position: relative;
        }

        .title-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        h1 { color: #b9fff7; text-shadow: 0 0 12px #00ffe1; margin: 0; font-size: 32px; }

        .info-icon {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid #3eeed2;
            color: #3eeed2;
            font-weight: bold;
            cursor: pointer;
        }

        .info-tooltip {
            visibility: hidden; opacity: 0;
            width: 300px; background: #1a1a1a; color: #e8fefe;
            text-align: left; border-radius: 10px; padding: 15px;
            position: absolute; z-index: 10; top: 150%; left: 50%;
            transform: translateX(-50%); border: 1px solid #3eeed2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            font-size: 14px; line-height: 1.8; transition: 0.2s;
        }
        .info-tooltip.show { visibility: visible; opacity: 1; }
        
        .t-ss { color: #ffb84d; font-weight: bold; }
        .t-s  { color: #fff176; font-weight: bold; }
        .t-a  { color: #ff8a80; font-weight: bold; }
        .t-b  { color: #81c784; font-weight: bold; }
        .t-c  { color: #64b5f6; font-weight: bold; }
        .t-d  { color: #bcaaa4; font-weight: bold; }

        /* 입력 및 단계 표시 영역 */
        .input-group { display: flex; flex-direction: column; align-items: center; width: 140px; }
        .label { color: #9efcff; font-weight: bold; margin-bottom: 10px; }
        .stage-display { color: #00ffe1; font-size: 13px; margin-top: 8px; font-weight: bold; height: 20px; }
        .inputs-container { display: flex; justify-content: space-around; }
        
        input { 
            width: 110px; padding: 12px; background: #0f0f0f; 
            border: 1px solid #3eeed2; border-radius: 8px; 
            color: #b9fff7; text-align: center; font-size: 18px;
            cursor: default;
        }
        input:focus { border: 1px solid #00ffe1; box-shadow: 0 0 12px #00ffe1; outline: none; }
        
        button {
            display: block; margin: 30px auto 0; width: 280px; padding: 15px;
            font-size: 20px; font-weight: bold; background: transparent;
            border: 2px solid #00ffe1; color: #b9fff7; border-radius: 10px;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #00ffe1; color: black; box-shadow: 0 0 20px #00ffe1; }

        .result-box { margin-top: 30px; padding: 25px; border-radius: 12px; display: none; border: 3px solid; transition: 0.3s; }
        .ss { border-color: #ffb84d; background: rgba(255, 184, 77, 0.1); color: #ffd699; }
        .s  { border-color: #fff176; background: rgba(255, 241, 118, 0.1); color: #fff9c4; }
        .a  { border-color: #ff8a80; background: rgba(255, 138, 128, 0.1); color: #ffcdd2; }
        .b  { border-color: #81c784; background: rgba(129, 199, 132, 0.1); color: #c8e6c9; }
        .c  { border-color: #64b5f6; background: rgba(100, 181, 246, 0.1); color: #bbdefb; }
        .d  { border-color: #bcaaa4; background: rgba(188, 170, 164, 0.1); color: #d7ccc8; }

        .grade { font-size: 32px; font-weight: bold; margin-top: 10px; }
        #error { color: #ff9b9b; margin-top: 15px; font-weight: bold; }
        .guide-text { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="title-wrapper">
        <h1>OPS 등급 계산기</h1>
        <div class="info-icon" onclick="toggleTooltip(event)">?
            <div class="info-tooltip" id="tooltip">
                <span class="t-ss">SS (1.050)</span> : 역사에 남을 시즌<br>
                <span class="t-s">S+ (1.000)</span> / <span class="t-s">S (0.950)</span><br>
                <span class="t-a">A+ (0.900)</span> / <span class="t-a">A (0.850)</span><br>
                <span class="t-b">B+ (0.800)</span> / <span class="t-b">B (0.750)</span><br>
                <span class="t-c">C+ (0.700)</span> / <span class="t-c">C (0.650)</span><br>
                <span class="t-d">D (0.600↓)</span> : 최악의 시즌
            </div>
        </div>
    </div>

    <div class="inputs-container">
        <div class="input-group">
            <div class="label">타율</div>
            <input id="avg" type="text" readonly value="0.280">
            <div id="avgStage" class="stage-display">3단계</div>
        </div>
        <div class="input-group">
            <div class="label">출루율</div>
            <input id="obp" type="text" readonly value="0.350">
            <div id="obpStage" class="stage-display">3단계</div>
        </div>
        <div class="input-group">
            <div class="label">장타율</div>
            <input id="slg" type="text" readonly value="0.400">
            <div id="slgStage" class="stage-display">3단계</div>
        </div>
    </div>
    
    <p class="guide-text">입력창 클릭 후 키보드 방향키(↑/↓)로 단계를 조절하세요.</p>
    <button onclick="calculate()">기록 계산하기</button>

    <p id="error"></p>
    <div id="resultBox" class="result-box">
        <p style="font-size: 18px; margin:0; opacity: 0.8;">최종 OPS</p>
        <span id="ops" style="font-size: 26px; font-weight: bold;"></span>
        <div class="grade" id="grade"></div>
    </div>
</div>

<script>
    // 💡 내부 데이터 정의
    const dataPool = {
        avg: [0.240, 0.260, 0.280, 0.300, 0.355],
        obp: [0.300, 0.330, 0.350, 0.400, 0.444],
        slg: [0.320, 0.370, 0.400, 0.500, 0.633]
    };

    // 현재 선택된 단계 (인덱스 0~4)
    let currentStages = { avg: 2, obp: 2, slg: 2 }; // 기본 3단계

    function updateDisplay(id) {
        const index = currentStages[id];
        const val = dataPool[id][index].toFixed(3);
        document.getElementById(id).value = val;
        document.getElementById(id + 'Stage').innerText = (index + 1) + "단계";
    }

    // 방향키 이벤트 리스너
    const inputIds = ["avg", "obp", "slg"];
    inputIds.forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp") {
                if (currentStages[id] < 4) currentStages[id]++;
                updateDisplay(id);
                e.preventDefault();
            } else if (e.key === "ArrowDown") {
                if (currentStages[id] > 0) currentStages[id]--;
                updateDisplay(id);
                e.preventDefault();
            }
        });
    });

    function toggleTooltip(event) {
        event.stopPropagation();
        document.getElementById('tooltip').classList.toggle('show');
    }

    document.addEventListener('click', () => document.getElementById('tooltip').classList.remove('show'));

    function getGrade(ops) {
        if (ops >= 1.050) return ["SS - 역사에 남을 시즌", "ss"];
        if (ops >= 1.000) return ["S+ - MVP급 시즌", "s"];
        if (ops >= 0.950) return ["S - 리그 최상위권", "s"];
        if (ops >= 0.900) return ["A+ - 리그 상위권", "a"];
        if (ops >= 0.850) return ["A - 훌륭한 시즌", "a"];
        if (ops >= 0.800) return ["B+ - 좋은 시즌", "b"];
        if (ops >= 0.750) return ["B - 평균적인 지표", "b"];
        if (ops >= 0.700) return ["C+ - 수비형 하한선", "c"];
        if (ops >= 0.650) return ["C - 아쉬운 시즌", "c"];
        return ["D - 최악의 시즌", "d"];
    }

    function calculate() {
        let obp = parseFloat(document.getElementById("obp").value);
        let slg = parseFloat(document.getElementById("slg").value);
        let ops = obp + slg;
        
        let [gradeText, gradeClass] = getGrade(ops);
        let box = document.getElementById("resultBox");
        
        document.getElementById("ops").innerText = ops.toFixed(3);
        document.getElementById("grade").innerText = gradeText;
        box.className = "result-box " + gradeClass;
        box.style.display = "block";
    }

    // 초기 실행
    inputIds.forEach(id => updateDisplay(id));
</script>

</body>
</html>
